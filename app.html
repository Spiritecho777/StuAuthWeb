<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StuAuthWeb</title>
    <style>
        body {
            background-color: #efefef;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            width: 300px;
        }

        .container {
            width: 100%;
        }

        .status {
            font-size: 12px;
            margin-bottom: 8px;
            min-height: 16px;
            color: #b00020;
        }

        .panel {
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
            background: white;
        }

        .folder-list-item,
        .account-list-item {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        .folder-list-item:last-child,
        .account-list-item:last-child {
            border-bottom: none;
        }

        .folder-list-item {
            cursor: pointer;
            font-weight: bold;
        }

        .folder-list-item:hover {
            background: #f7f7f7;
        }

        .account-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .copy-button {
            padding: 4px 8px;
            cursor: pointer;
        }

        .footer {
            text-align: right;
            font-size: 12px;
        }

        .footer a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="status" class="status"></div>

        <div id="folderList" class="panel"></div>
        <div id="accountList" class="panel"></div>

        <div class="footer">
            <a href="settings.html" target="_blank">Paramètres</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
